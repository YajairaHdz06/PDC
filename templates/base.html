{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Gestión de Estudiantes {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
    <div class="container py-4">
        <nav class="navbar mb-4 rounded-4 shadow-sm" style="background-color: white; border: 1px solid #eee;">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo.svg" alt="Bootstrap" width="30" height="24" class="me-2">
                    <span class="fw-bold" style="color: #4a90e2;">Mi primer proyecto web en Django</span>
                </a>
            </div>
        </nav>

        <div class="row">
            <div class="col-4">
                <div class="list-group shadow-sm border-0"> 
                    <a href="{% url 'index' %}" class="list-group-item list-group-item-action menu-inicio">Inicio</a>
                    <a href="{% url 'nosotros' %}" class="list-group-item list-group-item-action menu-inicio">Acerca de nosotros</a>
                    <a href="{% url 'contacto' %}" class="list-group-item list-group-item-action menu-inicio">Contáctanos</a>
                    <a href="{% url 'servicios' %}" class="list-group-item list-group-item-action menu-inicio">Servicios</a>
                    <a href="{% url 'galeria' %}" class="list-group-item list-group-item-action menu-inicio">Galería</a>
                    <a href="{% url 'milista' %}" class="list-group-item list-group-item-action menu-inicio">Mi Lista</a>
                    
                    <a href="{% url 'lista_estudiantes' %}" class="list-group-item list-group-item-action menu-estudiantes border-top mt-2"> Estudiantes</a>
                    <a href="{% url 'crear_estudiante' %}" class="list-group-item list-group-item-action menu-crear">+ Nuevo Estudiante</a>
                    <a href="{% url 'lista_carreras' %}" class="list-group-item list-group-item-action menu-carreras border-top mt-2"> Carreras</a>
                    <a href="{% url 'crear_carrera' %}" class="list-group-item list-group-item-action menu-crear">+ Nueva Carrera</a>
                </div>
            </div>
            
            <div class="col-8">
                <div class="main-card shadow-sm">
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
