{% extends 'base.html' %}
{% load static %}

{% block title %}Crear Carrera{% endblock %}

{% block content %}
<div class="container">
    <h1>Crear Carrera</h1>
    <form method="post" enctype="multipart/form-data" class="p-4 shadow-sm border rounded bg-white">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar Carrera</button>
    </form>
</div>
{% endblock %}
